# ihs_webrtc_view native presenter on Raspberry Pi (PiOS aarch64).
#
# Hardware/OS facts (toolchain, sysroot image, partition, cpu tuning, base
# DRM/EGL/GBM/Wayland/Vulkan stack) come from emb's shipped board library
# (boards/raspberry-pi.emb.yaml); each target extends a board. The presenter has
# no source deps to overlay — it links only libdl + pthreads from the sysroot.
#
#   emb cross . --target rpi4-trixie --build
#
# The Pi 4 has a stateful V4L2 H.264 decoder (bcm2835-codec); the Pi 5 has none,
# so on rpi5 frames only flow once a decoder is present (the software fallback
# lives in libwebrtc, not here).
#
# ihs_shared is consumed as a hard C ABI: the presenter uses only its vendored
# headers (native/third_party/ihs) at build time and dlsym/dlopen's
# libihs_shared.so (shipped on the target by ivi-homescreen) at run time, so it
# is neither an augment nor a sysroot dep. Likewise the platform-view registry
# owns the KMS/EGL import, so there is no drm-cxx or wayland link.
id: ihs_webrtc_view
type: app
supported_archs: [arm64]
supported_host_types: [ubuntu, fedora]

build:
  # CMake source is the presenter under native/, not the repo root.
  app_path: native
  archs: [arm64]
  modes: [release]
  output: bundles

cross:
  package:
    name: ihs-webrtc-view
    version: 0.1.0
    maintainer: "Joel Winarske <joel.winarske@gmail.com>"
    description: "ihs_webrtc_view zero-copy WebRTC presenter, cross-built by emb"
    section: libs
    # A shared library, not an executable — installed under the arch libdir.
    install_dir: /usr/lib/aarch64-linux-gnu

  targets:
    # The presenter has no augment libraries: it links only libdl + pthreads
    # from the sysroot and forwards frames to the registry via ihs_pv_submit.
    # -- Raspberry Pi 5 (Cortex-A76) --------------------------------------
    rpi5-trixie:
      extends: rpi5-trixie
      backends: &backends_presenter
        presenter: {}

    # -- Raspberry Pi 4 (Cortex-A72) — has the bcm2835-codec V4L2 decoder --
    rpi4-trixie:
      extends: rpi4-trixie
      backends: *backends_presenter
