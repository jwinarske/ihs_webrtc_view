name: ihs_webrtc_view
description: >-
  Zero-copy WebRTC video as a Flutter platform view for ivi-homescreen. Native
  presenter (dmabuf sink, tier resolver, plane/subsurface/GPU-import
  tiers) plus the Flutter widget and track->sink-token binding glue. Data
  plane is native-to-native; Dart brokers the binding only.
version: 0.1.0
publish_to: none
repository: https://github.com/jwinarske/ihs_webrtc_view

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  rtc_dart:
    path: ../rtc_dart

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      linux:
        # Native presenter built via native/CMakeLists.txt; the platform-view
        # widget + bindSink glue live in lib/. No dartPluginClass — this is an
        # FFI + platform-view plugin, not a method-channel one.
        pluginClass: none
